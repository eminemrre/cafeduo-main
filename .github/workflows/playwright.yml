name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  smoke-critical:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke-critical Playwright tests
        run: npx playwright test --project=chromium --grep @smoke
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          E2E_API_BASE_URL: http://127.0.0.1:3001
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 30

  advanced-realtime:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    continue-on-error: true
    timeout-minutes: 45
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Run advanced realtime Playwright tests
        run: npx playwright test --project=chromium --grep @advanced
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          E2E_API_BASE_URL: http://127.0.0.1:3001
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-advanced
          path: playwright-report/
          retention-days: 30
